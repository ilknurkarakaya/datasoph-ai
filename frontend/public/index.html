    <meta name="cache-bust" content="ULTRA-v5.0-<?php echo uniqid(mt_rand(), true); ?>" />

    <meta name="timestamp" content="<?php echo microtime(true); ?>" />
    <meta name="no-cache" content="true" />
    <meta name="cache-control" content="no-cache" />
    
    <meta
      name="description"
      content="DataSoph AI - Advanced Data Analysis Platform"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>DataSoph AI - ULTRA REFRESH ⚡🔄⚡</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- ULTRA CACHE DESTROYER -->
    <script>
      // Kill ALL caches immediately
      window.addEventListener('beforeunload', function() {
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) {
              caches.delete(name);
            });
          });
        }
      });
      
      // Force reload on focus
      window.addEventListener('focus', function() {
        if (performance.navigation.type === 2) {
          window.location.reload(true);
        }
      });
      
      // Disable service worker registration
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
      
      // Add timestamp to all resources
      var links = document.querySelectorAll('link[rel="stylesheet"]');
      links.forEach(function(link) {
        var href = link.href;
        link.href = href + (href.indexOf('?') >= 0 ? '&' : '?') + 'v=' + Date.now();
      });
    </script>
  </body>
</html>
